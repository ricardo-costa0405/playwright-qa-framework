name: 'Smoke Tests'

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: playwright-smoke-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  smoke:
    timeout-minutes: 20
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js 24.x
        uses: actions/setup-node@v5
        with:
          node-version: 24.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        run: |
          npx playwright install-deps chromium
          npx playwright install chromium

      - name: Run smoke tests
        run: npm run test:smoke -- --project=chromium --workers=4
        env:
          CI: 'true'
          PW_BROWSER: 'chromium'

      - name: Upload results
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: smoke-test-results
          path: reports/
          retention-days: 7

      - name: Comment PR with results
        uses: actions/github-script@v8
        if: github.event_name == 'pull_request' && always()
        with:
          script: |
            const fs = require('fs');
            const xmlPath = 'reports/junit/web-results.xml';
            if (!fs.existsSync(xmlPath)) {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: 'No JUnit report found — tests may not have produced output.',
              });
              return;
            }

            const xml = fs.readFileSync(xmlPath, 'utf8');

            // Parse root <testsuites> attributes
            const root = xml.match(/<testsuites[^>]*>/)?.[0] ?? '';
            const attr = (name) => {
              const m = root.match(new RegExp(`${name}="([^"]+)"`));
              return m ? m[1] : '0';
            };

            const total    = parseInt(attr('tests'),    10) || 0;
            const failures = parseInt(attr('failures'), 10) || 0;
            const errors   = parseInt(attr('errors'),   10) || 0;
            const skipped  = parseInt(attr('skipped'),  10) || 0;
            const duration = parseFloat(attr('time'))       || 0;
            const passed   = total - failures - errors - skipped;

            // Per-test durations
            const testCases = [...xml.matchAll(/<testcase\s+([^>]*)>/g)].map(m => {
              const nameAttr = m[1].match(/name="([^"]+)"/);
              const timeAttr = m[1].match(/time="([\d.]+)"/);
              // Check if this testcase contains a failure element
              const idx = m.index;
              const endIdx = xml.indexOf('</testcase>', idx);
              const block = xml.slice(idx, endIdx + 11);
              const hasFailure = /<(failure|error)\b/i.test(block);
              const failureMsg = block.match(/<(failure|error)\b[^>]*>([^<]*)/);
              return {
                name: nameAttr ? nameAttr[1] : 'unknown',
                time: timeAttr ? parseFloat(timeAttr[1]) : 0,
                failed: hasFailure,
                failureDetail: failureMsg ? failureMsg[2]?.trim() : null,
              };
            });

            const times = testCases.map(t => t.time).filter(t => t > 0);
            const avg = times.length
              ? (times.reduce((a, b) => a + b, 0) / times.length).toFixed(2)
              : '0.00';
            const max = times.length ? Math.max(...times).toFixed(2) : '0.00';

            const allPassed = failures + errors === 0;
            const statusEmoji = allPassed ? '✅' : '❌';
            const statusLabel = allPassed ? 'PASS' : 'FAIL';

            // Failure details collapsible section
            const failedTests = testCases.filter(t => t.failed);
            let failureDetails = '';
            if (failedTests.length > 0) {
              const lines = failedTests.map(t =>
                `| \`${t.name}\` | ${t.failureDetail || 'No detail'} |`
              );
              failureDetails = [
                '<details>',
                `<summary>❌ Failed tests (${failedTests.length})</summary>`,
                '',
                '| Test | Error |',
                '|------|-------|',
                ...lines,
                '</details>',
                '',
              ].join('\n');
            }

            // Slow test outliers (2x+ average, > 5s)
            const slowThreshold = Math.max(parseFloat(avg) * 2, 5);
            const slowTests = testCases.filter(t => t.time > slowThreshold && !t.failed);
            let slowSection = '';
            if (slowTests.length > 0) {
              const lines = slowTests.map(t =>
                `| \`${t.name}\` | ${t.time.toFixed(2)}s |`
              );
              slowSection = [
                '<details>',
                `<summary>🐢 Slow tests (>&nbsp;${slowThreshold.toFixed(1)}s) — ${slowTests.length}</summary>`,
                '',
                '| Test | Duration |',
                '|------|----------|',
                ...lines,
                '</details>',
                '',
              ].join('\n');
            }

            const runLink = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const body = [
              `## 🧪 Smoke Tests  ${statusEmoji}`,
              '',
              `| Metric         | Value |`,
              `|----------------|-------|`,
              `| **Status**     | ${statusEmoji} **${statusLabel}** |`,
              `| ✅ Passed      | ${passed} / ${total} |`,
              `| ❌ Failed      | ${failures + errors} |`,
              `| ⏭️ Skipped     | ${skipped} |`,
              `| ⏱ Duration     | ${duration.toFixed(2)}s |`,
              `| 📊 Avg / test  | ${avg}s |`,
              `| 📈 Max / test  | ${max}s |`,
              `| 🔗 Workflow    | [Run #${context.runId}](${runLink}) |`,
              '',
              failureDetails,
              slowSection,
              `_Report generated from ${xmlPath}_`,
            ].join('\n');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
