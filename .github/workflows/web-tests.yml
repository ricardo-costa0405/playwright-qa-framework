name: 'Web Tests - Playwright'

on:
  push:
    branches: [main, develop]
  schedule:
    - cron: '0 2 * * *' # Daily at 2 AM UTC

concurrency:
  group: playwright-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    permissions:
      checks: write
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ matrix.browser }}-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright system deps
        run: |
          npx playwright install-deps ${{ matrix.browser }}
          if [ "${{ matrix.browser }}" = "webkit" ]; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq \
              libwoff2dec1 \
              libwpe-1.0-1 \
              libwpebackend-fdo-1.0-1 \
              libgstreamer-plugins-bad1.0-0 \
              gstreamer1.0-libav \
              gstreamer1.0-plugins-good \
              gstreamer1.0-plugins-bad \
              2>/dev/null || true
          fi

      - name: Install Playwright browsers
        run: npx playwright install ${{ matrix.browser }}

      - name: Run web tests - ${{ matrix.browser }}
        run: npm run test:web -- --project=${{ matrix.browser }}
        env:
          CI: 'true'
          PW_BROWSER: ${{ matrix.browser }}

      - name: Upload JUnit results
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: junit-results-web-${{ matrix.browser }}
          path: reports/junit/web-results.xml
          retention-days: 30

      - name: Upload HTML report
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: html-report-web-${{ matrix.browser }}
          path: reports/html/web
          retention-days: 30

      - name: Upload screencast on failure
        uses: actions/upload-artifact@v5
        if: failure()
        with:
          name: screencast-web-${{ matrix.browser }}
          path: reports/screencast-debug
          retention-days: 7

      - name: Write job summary
        uses: actions/github-script@v8
        if: always()
        with:
          script: |
            const fs = require('fs');
            const xmlPath = 'reports/junit/web-results.xml';
            if (!fs.existsSync(xmlPath)) {
              await core.summary.addRaw('No JUnit report found.').write();
              return;
            }
            const xml = fs.readFileSync(xmlPath, 'utf8');
            const root = xml.match(/<testsuites[^>]*>/)?.[0] ?? '';
            const attr = (name) => {
              const m = root.match(new RegExp(`${name}="([^"]+)"`));
              return m ? m[1] : '0';
            };
            const total    = parseInt(attr('tests'),    10) || 0;
            const failures = parseInt(attr('failures'), 10) || 0;
            const errors   = parseInt(attr('errors'),   10) || 0;
            const skipped  = parseInt(attr('skipped'),  10) || 0;
            const duration = parseFloat(attr('time'))       || 0;
            const passed   = total - failures - errors - skipped;
            const badge    = failures + errors === 0 ? '✅ PASS' : '❌ FAIL';

            await core.summary
              .addHeading(`Web Tests – ${{ matrix.browser }}  ${badge}`)
              .addTable([
                [{data: 'Metric', header: true}, {data: 'Value', header: true}],
                ['Passed',   `${passed} / ${total}`],
                ['Failed',   `${failures + errors}`],
                ['Skipped',  `${skipped}`],
                ['Duration', `${duration.toFixed(2)}s`],
              ])
              .write();

  merge-results:
    needs: test
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download all JUnit reports
        uses: actions/download-artifact@v5
        with:
          path: junit-artifacts

      - name: Merge JUnit results
        run: |
          npm install -g junit-report-merger
          mkdir -p reports/junit
          junit-report-merger reports/junit/merged-results.xml "junit-artifacts/**/web-results.xml" || true

      - name: Upload merged results
        uses: actions/upload-artifact@v5
        with:
          name: junit-merged-results
          path: reports/junit/merged-results.xml
          retention-days: 30
